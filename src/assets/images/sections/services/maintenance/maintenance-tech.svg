<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 410" fill="none">
  <defs>
    <linearGradient id="mt1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB6557"/>
      <stop offset="100%" stop-color="#FE9139"/>
    </linearGradient>
    <linearGradient id="mt2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="mtRad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FE9139" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FB6557" stop-opacity="0.02"/>
    </radialGradient>
    <filter id="mtSh" x="-15%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#FB6557" flood-opacity="0.22"/>
    </filter>
    <filter id="mtGl">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- 3D Dashboard shadow -->
  <rect x="103" y="65" width="264" height="185" rx="18" fill="#D44F3D" opacity="0.04" transform="translate(4, 5)"/>

  <!-- 3D Dashboard -->
  <rect x="98" y="58" width="264" height="185" rx="18" stroke="url(#mt1)" stroke-width="2.5" fill="url(#mtRad)" filter="url(#mtSh)"/>
  <rect x="105" y="63" width="180" height="25" rx="12" fill="url(#mt2)" opacity="0.2"/>

  <!-- Dashboard panels -->
  <rect x="118" y="85" width="104" height="62" rx="10" stroke="url(#mt1)" stroke-width="1.5" fill="url(#mt1)" fill-opacity="0.04" filter="url(#mtSh)"/>
  <rect x="238" y="85" width="104" height="62" rx="10" stroke="url(#mt1)" stroke-width="1.5" fill="url(#mt1)" fill-opacity="0.04" filter="url(#mtSh)"/>
  <rect x="118" y="160" width="224" height="62" rx="10" stroke="url(#mt1)" stroke-width="1.5" fill="url(#mt1)" fill-opacity="0.04" filter="url(#mtSh)"/>

  <!-- Mini chart in panel 1 -->
  <path d="M133 132 L150 122 L168 127 L185 112 L198 117 L208 102" stroke="url(#mt1)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="208" cy="102" r="3" fill="url(#mt1)"/>

  <!-- Status bars in panel 2 -->
  <rect x="253" y="100" width="72" height="7" rx="3.5" fill="url(#mt1)" opacity="0.35"/>
  <rect x="253" y="113" width="58" height="7" rx="3.5" fill="url(#mt1)" opacity="0.28"/>
  <rect x="253" y="126" width="82" height="7" rx="3.5" fill="url(#mt1)" opacity="0.42"/>

  <!-- Progress bar in panel 3 -->
  <rect x="133" y="186" width="194" height="10" rx="5" fill="url(#mt1)" opacity="0.1"/>
  <rect x="133" y="186" width="174" height="10" rx="5" fill="url(#mt1)" opacity="0.3"/>
  <rect x="133" y="186" width="174" height="4" rx="2" fill="url(#mt2)" opacity="0.2"/>

  <!-- Tools around dashboard -->
  <!-- 3D Terminal -->
  <rect x="38" y="282" width="105" height="72" rx="10" stroke="url(#mt1)" stroke-width="1.5" fill="url(#mtRad)" filter="url(#mtSh)"/>
  <rect x="42" y="285" width="70" height="15" rx="7" fill="url(#mt2)" opacity="0.15"/>
  <text x="52" y="308" font-family="monospace" font-size="10" fill="url(#mt1)" opacity="0.7">$ monitor</text>
  <text x="52" y="322" font-family="monospace" font-size="10" fill="#4CAF50" opacity="0.6">✓ all ok</text>
  <text x="52" y="336" font-family="monospace" font-size="10" fill="url(#mt1)" opacity="0.3">$ _</text>

  <!-- 3D Alert bell -->
  <circle cx="385" cy="305" r="38" stroke="url(#mt1)" stroke-width="1.5" fill="url(#mtRad)" filter="url(#mtSh)"/>
  <circle cx="380" cy="296" r="16" fill="url(#mt2)" opacity="0.15"/>
  <path d="M375 300 Q375 280 385 276 Q395 280 395 300 L400 312 L370 312 Z" stroke="url(#mt1)" stroke-width="2" fill="url(#mt1)" fill-opacity="0.15"/>
  <circle cx="385" cy="318" r="4" fill="url(#mt1)" opacity="0.4"/>
  <circle cx="400" cy="282" r="7" fill="#4CAF50" opacity="0.5" filter="url(#mtSh)"/>
  <circle cx="398" cy="280" r="3" fill="white" opacity="0.2"/>

  <!-- 3D Shield center -->
  <path d="M230 270 L268 286 L268 318 Q268 345 230 355 Q192 345 192 318 L192 286 Z" stroke="url(#mt1)" stroke-width="2" fill="url(#mtRad)" filter="url(#mtSh)"/>
  <path d="M230 276 L260 290 L260 300 Q248 282 225 280 Z" fill="url(#mt2)" opacity="0.2"/>
  <path d="M220 312 L228 320 L244 304" stroke="url(#mt1)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Connection lines -->
  <path d="M143 282 L192 296" stroke="url(#mt1)" stroke-width="1.2" opacity="0.2" stroke-dasharray="5 4"/>
  <path d="M347 305 L268 310" stroke="url(#mt1)" stroke-width="1.2" opacity="0.2" stroke-dasharray="5 4"/>
  <path d="M230 243 L230 270" stroke="url(#mt1)" stroke-width="1.5" opacity="0.25" stroke-dasharray="5 4"/>
</svg>
