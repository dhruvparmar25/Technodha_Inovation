<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 410" fill="none">
  <defs>
    <linearGradient id="mp1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB6557"/>
      <stop offset="100%" stop-color="#FE9139"/>
    </linearGradient>
    <linearGradient id="mp2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="mpRad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FE9139" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FB6557" stop-opacity="0.02"/>
    </radialGradient>
    <filter id="mpSh" x="-15%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#FB6557" flood-opacity="0.22"/>
    </filter>
    <filter id="mpGl">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background shape -->
  <rect x="55" y="35" width="350" height="340" rx="32" fill="url(#mpRad)"/>

  <!-- 3D Monitor shadow -->
  <rect x="133" y="75" width="204" height="145" rx="14" fill="#D44F3D" opacity="0.04" transform="translate(4, 5)"/>

  <!-- 3D Monitor -->
  <rect x="128" y="68" width="204" height="145" rx="14" stroke="url(#mp1)" stroke-width="2.5" fill="white" fill-opacity="0.4" filter="url(#mpSh)"/>
  <rect x="134" y="73" width="150" height="25" rx="10" fill="url(#mp2)" opacity="0.25"/>

  <!-- Screen -->
  <rect x="140" y="82" width="180" height="118" rx="8" fill="url(#mp1)" fill-opacity="0.03"/>

  <!-- 3D Heartbeat on monitor -->
  <path d="M155 142 L188 142 L198 115 L215 170 L225 125 L235 148 L245 142 L310 142" stroke="url(#mp1)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M155 142 L188 142 L198 115 L215 170 L225 125 L235 148 L245 142 L310 142" stroke="url(#mp1)" stroke-width="8" fill="none" opacity="0.05" filter="url(#mpGl)"/>

  <!-- Monitor stand -->
  <rect x="200" y="213" width="60" height="12" rx="4" fill="url(#mp1)" opacity="0.2" filter="url(#mpSh)"/>
  <rect x="180" y="225" width="100" height="8" rx="4" fill="url(#mp1)" opacity="0.12"/>

  <!-- Status dots -->
  <circle cx="155" cy="93" r="5" fill="#4CAF50" opacity="0.55" filter="url(#mpSh)"/>
  <circle cx="170" cy="93" r="5" fill="url(#mp1)" opacity="0.4"/>
  <circle cx="185" cy="93" r="5" fill="url(#mp1)" opacity="0.2"/>

  <!-- 3D Wrench -->
  <g transform="translate(72, 260) rotate(-18)">
    <rect x="0" y="8" width="52" height="12" rx="4" fill="url(#mp1)" opacity="0.45" filter="url(#mpSh)"/>
    <rect x="0" y="8" width="52" height="5" rx="3" fill="url(#mp2)" opacity="0.3"/>
    <circle cx="58" cy="14" r="15" stroke="url(#mp1)" stroke-width="2" fill="none" opacity="0.35"/>
    <circle cx="58" cy="14" r="6" fill="url(#mp1)" opacity="0.25"/>
  </g>

  <!-- 3D Gear -->
  <circle cx="345" cy="285" r="30" stroke="url(#mp1)" stroke-width="2.5" fill="url(#mp1)" fill-opacity="0.08" filter="url(#mpSh)"/>
  <circle cx="345" cy="283" r="15" fill="url(#mp1)" opacity="0.2"/>
  <circle cx="342" cy="280" r="6" fill="white" opacity="0.1"/>
  <rect x="339" y="250" width="12" height="9" rx="3" fill="url(#mp1)" opacity="0.35"/>
  <rect x="339" y="310" width="12" height="9" rx="3" fill="url(#mp1)" opacity="0.3"/>
  <rect x="310" y="279" width="9" height="12" rx="3" fill="url(#mp1)" opacity="0.3"/>
  <rect x="371" y="279" width="9" height="12" rx="3" fill="url(#mp1)" opacity="0.3"/>

  <!-- 3D Shield -->
  <path d="M230 272 L262 285 L262 315 Q262 338 230 348 Q198 338 198 315 L198 285 Z" stroke="url(#mp1)" stroke-width="2" fill="url(#mpRad)" filter="url(#mpSh)"/>
  <path d="M230 278 L255 288 L255 298 Q245 282 225 280 Z" fill="url(#mp2)" opacity="0.2"/>
  <path d="M220 308 L228 316 L244 300" stroke="url(#mp1)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
