<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  <defs>
    <linearGradient id="up1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB6557"/>
      <stop offset="100%" stop-color="#FE9139"/>
    </linearGradient>
    <linearGradient id="up2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="upRad" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FE9139" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FB6557" stop-opacity="0.02"/>
    </radialGradient>
    <filter id="upSh" x="-15%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#FB6557" flood-opacity="0.22"/>
    </filter>
    <filter id="upGl">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- 3D Circular arrows with glow -->
  <!-- Back glow -->
  <circle cx="140" cy="140" r="82" stroke="url(#up1)" stroke-width="8" fill="none" opacity="0.05" filter="url(#upGl)"/>

  <!-- Circular arrow segments -->
  <path d="M140 58 A82 82 0 0 1 222 140" stroke="url(#up1)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M222 140 A82 82 0 0 1 140 222" stroke="url(#up1)" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M140 222 A82 82 0 0 1 58 140" stroke="url(#up1)" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M58 140 A82 82 0 0 1 140 58" stroke="url(#up1)" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- 3D Arrow heads with depth -->
  <polygon points="140,50 150,68 130,68" fill="url(#up1)" filter="url(#upSh)"/>
  <polygon points="136,52 146,62 136,62" fill="url(#up2)" opacity="0.4"/>

  <polygon points="230,140 212,130 212,150" fill="url(#up1)" filter="url(#upSh)"/>
  <polygon points="224,136 216,136 216,144" fill="url(#up2)" opacity="0.3"/>

  <polygon points="140,230 130,212 150,212" fill="url(#up1)" opacity="0.8" filter="url(#upSh)"/>
  <polygon points="50,140 68,150 68,130" fill="url(#up1)" opacity="0.6" filter="url(#upSh)"/>

  <!-- 3D Center version badge -->
  <circle cx="140" cy="140" r="40" fill="url(#upRad)" stroke="url(#up1)" stroke-width="2.5" filter="url(#upSh)"/>
  <!-- Glass highlight -->
  <ellipse cx="130" cy="125" rx="22" ry="12" fill="url(#up2)" opacity="0.4"/>

  <!-- Version text -->
  <text x="116" y="138" font-family="Arial" font-weight="bold" font-size="16" fill="url(#up1)">v2.0</text>

  <!-- 3D Up arrow inside -->
  <path d="M140 145 L140 162" stroke="url(#up1)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M133 153 L140 145 L147 153" stroke="url(#up1)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
