<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  <defs>
    <linearGradient id="bf1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB6557"/>
      <stop offset="100%" stop-color="#FE9139"/>
    </linearGradient>
    <linearGradient id="bf2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="bfRad" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FE9139" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FB6557" stop-opacity="0.02"/>
    </radialGradient>
    <filter id="bfSh" x="-15%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#FB6557" flood-opacity="0.22"/>
    </filter>
    <filter id="bfGl">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- 3D Bug body shadow -->
  <ellipse cx="143" cy="162" rx="52" ry="68" fill="#D44F3D" opacity="0.05"/>

  <!-- 3D Bug body -->
  <ellipse cx="140" cy="155" rx="52" ry="68" stroke="url(#bf1)" stroke-width="2.5" fill="url(#bfRad)" filter="url(#bfSh)"/>
  <!-- Glass highlight -->
  <ellipse cx="125" cy="120" rx="28" ry="18" fill="url(#bf2)" opacity="0.4"/>

  <!-- 3D Bug head -->
  <circle cx="140" cy="78" r="28" stroke="url(#bf1)" stroke-width="2.5" fill="url(#bfRad)" filter="url(#bfSh)"/>
  <circle cx="132" cy="68" r="12" fill="url(#bf2)" opacity="0.35"/>

  <!-- 3D Bug eyes -->
  <circle cx="128" cy="73" r="8" fill="url(#bf1)" opacity="0.65" filter="url(#bfSh)"/>
  <circle cx="126" cy="70" r="3.5" fill="white" opacity="0.4"/>
  <circle cx="152" cy="73" r="8" fill="url(#bf1)" opacity="0.65" filter="url(#bfSh)"/>
  <circle cx="150" cy="70" r="3.5" fill="white" opacity="0.4"/>

  <!-- 3D Bug antenna -->
  <path d="M122 55 Q105 35 95 28" stroke="url(#bf1)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M158 55 Q175 35 185 28" stroke="url(#bf1)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="95" cy="28" r="5" fill="url(#bf1)" filter="url(#bfSh)"/>
  <circle cx="93" cy="26" r="2" fill="white" opacity="0.3"/>
  <circle cx="185" cy="28" r="5" fill="url(#bf1)" filter="url(#bfSh)"/>
  <circle cx="183" cy="26" r="2" fill="white" opacity="0.3"/>

  <!-- 3D Bug legs -->
  <path d="M88 128 L55 108" stroke="url(#bf1)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M88 155 L48 155" stroke="url(#bf1)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M88 182 L55 205" stroke="url(#bf1)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M192 128 L225 108" stroke="url(#bf1)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M192 155 L232 155" stroke="url(#bf1)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M192 182 L225 205" stroke="url(#bf1)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 3D Crosshair target -->
  <circle cx="140" cy="145" r="42" stroke="url(#bf1)" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="6 4"/>
  <line x1="140" y1="93" x2="140" y2="197" stroke="url(#bf1)" stroke-width="1.2" opacity="0.2"/>
  <line x1="88" y1="145" x2="192" y2="145" stroke="url(#bf1)" stroke-width="1.2" opacity="0.2"/>

  <!-- 3D Fix badge -->
  <circle cx="215" cy="230" r="25" fill="url(#bf1)" opacity="0.1" filter="url(#bfGl)"/>
  <circle cx="213" cy="228" r="22" fill="url(#bfRad)" stroke="url(#bf1)" stroke-width="2.5" filter="url(#bfSh)"/>
  <circle cx="208" cy="222" r="9" fill="url(#bf2)" opacity="0.3"/>
  <path d="M203 228 L210 235 L225 220" stroke="url(#bf1)" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
