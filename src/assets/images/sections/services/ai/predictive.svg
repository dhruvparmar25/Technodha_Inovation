<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  <defs>
    <linearGradient id="pr1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB6557"/>
      <stop offset="100%" stop-color="#FE9139"/>
    </linearGradient>
    <linearGradient id="pr2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="prOrb" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FE9139" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FB6557" stop-opacity="0.03"/>
    </radialGradient>
    <filter id="prSh" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#FB6557" flood-opacity="0.25"/>
    </filter>
    <filter id="prGl">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- 3D Globe base shadow -->
  <ellipse cx="143" cy="233" rx="52" ry="10" fill="#FB6557" opacity="0.1" filter="url(#prGl)"/>

  <!-- 3D Stand -->
  <rect x="108" y="215" width="64" height="16" rx="5" fill="url(#pr1)" opacity="0.3"/>
  <rect x="108" y="215" width="64" height="6" rx="5" fill="url(#pr2)" opacity="0.4"/>

  <!-- 3D Globe shadow -->
  <circle cx="143" cy="143" r="78" fill="#D44F3D" opacity="0.05"/>

  <!-- 3D Globe main -->
  <circle cx="140" cy="140" r="78" stroke="url(#pr1)" stroke-width="2.5" fill="url(#prOrb)" filter="url(#prSh)"/>
  <!-- Glass highlight -->
  <ellipse cx="120" cy="105" rx="40" ry="25" fill="url(#pr2)" opacity="0.45"/>

  <!-- 3D Outer glow ring -->
  <circle cx="140" cy="140" r="88" stroke="url(#pr1)" stroke-width="1" fill="none" opacity="0.12"/>

  <!-- 3D Trend line inside globe -->
  <path d="M82 175 Q100 158 118 162 Q135 168 140 140 Q148 112 168 118 Q182 123 198 92" stroke="url(#pr1)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Glow behind line -->
  <path d="M82 175 Q100 158 118 162 Q135 168 140 140 Q148 112 168 118 Q182 123 198 92" stroke="#FE9139" stroke-width="6" fill="none" opacity="0.1" filter="url(#prGl)"/>

  <!-- 3D Dashed future prediction -->
  <path d="M198 92 Q208 72 218 78" stroke="#FE9139" stroke-width="2.5" fill="none" stroke-dasharray="5 4" stroke-linecap="round"/>

  <!-- 3D Data nodes with glow -->
  <circle cx="82" cy="175" r="6" fill="url(#pr1)" filter="url(#prSh)"/>
  <circle cx="82" cy="173" r="2.5" fill="white" opacity="0.4"/>
  <circle cx="118" cy="162" r="6" fill="url(#pr1)" filter="url(#prSh)"/>
  <circle cx="118" cy="160" r="2.5" fill="white" opacity="0.4"/>
  <circle cx="140" cy="140" r="7" fill="url(#pr1)" filter="url(#prSh)"/>
  <circle cx="140" cy="138" r="3" fill="white" opacity="0.5"/>
  <circle cx="168" cy="118" r="6" fill="url(#pr1)" filter="url(#prSh)"/>
  <circle cx="168" cy="116" r="2.5" fill="white" opacity="0.4"/>
  <circle cx="198" cy="92" r="7" fill="url(#pr1)" filter="url(#prSh)"/>
  <circle cx="198" cy="90" r="3" fill="white" opacity="0.5"/>

  <!-- 3D Sparkle at peak -->
  <path d="M205 75 L208 85 L218 88 L208 91 L205 101 L202 91 L192 88 L202 85 Z" fill="#FE9139" opacity="0.65" filter="url(#prSh)"/>
</svg>
