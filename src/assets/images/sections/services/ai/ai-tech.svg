<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 410" fill="none">
  <defs>
    <linearGradient id="at1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB6557"/>
      <stop offset="100%" stop-color="#FE9139"/>
    </linearGradient>
    <linearGradient id="at2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="atRad" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FE9139" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FB6557" stop-opacity="0.02"/>
    </radialGradient>
    <filter id="atSh" x="-15%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#FB6557" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 3D Chip shadow -->
  <rect x="168" y="148" width="134" height="134" rx="20" fill="#D44F3D" opacity="0.05"/>

  <!-- 3D Central AI chip -->
  <rect x="163" y="140" width="134" height="134" rx="20" stroke="url(#at1)" stroke-width="3" fill="url(#atRad)" filter="url(#atSh)"/>
  <rect x="170" y="145" width="100" height="30" rx="14" fill="url(#at2)" opacity="0.25"/>

  <!-- Inner chip -->
  <rect x="188" y="165" width="84" height="84" rx="12" stroke="url(#at1)" stroke-width="2" fill="url(#at1)" fill-opacity="0.08"/>

  <!-- AI text -->
  <text x="205" y="218" font-family="Arial" font-weight="bold" font-size="30" fill="url(#at1)">AI</text>

  <!-- 3D Chip pins -->
  <g opacity="0.7">
    <line x1="195" y1="140" x2="195" y2="115" stroke="url(#at1)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="195" cy="112" r="4" fill="url(#at1)" filter="url(#atSh)"/>
    <line x1="220" y1="140" x2="220" y2="115" stroke="url(#at1)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="220" cy="112" r="4" fill="url(#at1)" filter="url(#atSh)"/>
    <line x1="245" y1="140" x2="245" y2="115" stroke="url(#at1)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="245" cy="112" r="4" fill="url(#at1)" filter="url(#atSh)"/>
    <line x1="270" y1="140" x2="270" y2="115" stroke="url(#at1)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="270" cy="112" r="4" fill="url(#at1)" filter="url(#atSh)"/>
  </g>
  <g opacity="0.7">
    <line x1="195" y1="274" x2="195" y2="299" stroke="url(#at1)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="195" cy="302" r="4" fill="url(#at1)" filter="url(#atSh)"/>
    <line x1="220" y1="274" x2="220" y2="299" stroke="url(#at1)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="220" cy="302" r="4" fill="url(#at1)" filter="url(#atSh)"/>
    <line x1="245" y1="274" x2="245" y2="299" stroke="url(#at1)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="245" cy="302" r="4" fill="url(#at1)" filter="url(#atSh)"/>
    <line x1="270" y1="274" x2="270" y2="299" stroke="url(#at1)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="270" cy="302" r="4" fill="url(#at1)" filter="url(#atSh)"/>
  </g>
  <g opacity="0.7">
    <line x1="163" y1="172" x2="138" y2="172" stroke="url(#at1)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="135" cy="172" r="4" fill="url(#at1)" filter="url(#atSh)"/>
    <line x1="163" y1="197" x2="138" y2="197" stroke="url(#at1)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="135" cy="197" r="4" fill="url(#at1)" filter="url(#atSh)"/>
    <line x1="163" y1="222" x2="138" y2="222" stroke="url(#at1)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="135" cy="222" r="4" fill="url(#at1)" filter="url(#atSh)"/>
    <line x1="163" y1="247" x2="138" y2="247" stroke="url(#at1)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="135" cy="247" r="4" fill="url(#at1)" filter="url(#atSh)"/>
  </g>
  <g opacity="0.7">
    <line x1="297" y1="172" x2="322" y2="172" stroke="url(#at1)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="325" cy="172" r="4" fill="url(#at1)" filter="url(#atSh)"/>
    <line x1="297" y1="197" x2="322" y2="197" stroke="url(#at1)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="325" cy="197" r="4" fill="url(#at1)" filter="url(#atSh)"/>
    <line x1="297" y1="222" x2="322" y2="222" stroke="url(#at1)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="325" cy="222" r="4" fill="url(#at1)" filter="url(#atSh)"/>
    <line x1="297" y1="247" x2="322" y2="247" stroke="url(#at1)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="325" cy="247" r="4" fill="url(#at1)" filter="url(#atSh)"/>
  </g>

  <!-- Corner decorations -->
  <path d="M75 75 L100 75 L100 100" stroke="url(#at1)" stroke-width="1.5" fill="none" opacity="0.15"/>
  <path d="M385 75 L360 75 L360 100" stroke="url(#at1)" stroke-width="1.5" fill="none" opacity="0.15"/>
  <path d="M75 335 L100 335 L100 310" stroke="url(#at1)" stroke-width="1.5" fill="none" opacity="0.15"/>
  <path d="M385 335 L360 335 L360 310" stroke="url(#at1)" stroke-width="1.5" fill="none" opacity="0.15"/>

  <!-- 3D Tech badges -->
  <circle cx="105" cy="58" r="20" stroke="url(#at1)" stroke-width="1.5" fill="url(#at1)" fill-opacity="0.06" filter="url(#atSh)"/>
  <text x="94" y="64" font-family="monospace" font-weight="bold" font-size="14" fill="url(#at1)">Py</text>
  <circle cx="355" cy="58" r="20" stroke="url(#at1)" stroke-width="1.5" fill="url(#at1)" fill-opacity="0.06" filter="url(#atSh)"/>
  <text x="344" y="64" font-family="monospace" font-weight="bold" font-size="14" fill="url(#at1)">TF</text>
</svg>
