<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  <defs>
    <linearGradient id="pa1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB6557"/>
      <stop offset="100%" stop-color="#FE9139"/>
    </linearGradient>
    <linearGradient id="pa2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pa3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FB6557" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FE9139" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="paSh" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#FB6557" flood-opacity="0.25"/>
    </filter>
    <filter id="paGl" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background circle glow -->
  <circle cx="140" cy="125" r="95" fill="url(#pa3)"/>

  <!-- 3D Gear - back shadow -->
  <circle cx="143" cy="128" r="58" fill="#D44F3D" opacity="0.08"/>

  <!-- 3D Gear outer ring -->
  <circle cx="140" cy="122" r="58" stroke="url(#pa1)" stroke-width="4" fill="none"/>

  <!-- Gear teeth - 3D raised look -->
  <rect x="132" y="57" width="16" height="14" rx="4" fill="url(#pa1)"/>
  <rect x="132" y="57" width="16" height="7" rx="4" fill="url(#pa2)"/>
  <rect x="132" y="173" width="16" height="14" rx="4" fill="url(#pa1)"/>
  <rect x="75" y="114" width="14" height="16" rx="4" fill="url(#pa1)"/>
  <rect x="191" y="114" width="14" height="16" rx="4" fill="url(#pa1)"/>
  <!-- Diagonal teeth -->
  <rect x="101" y="73" width="14" height="14" rx="4" fill="url(#pa1)" transform="rotate(-45, 108, 80)" opacity="0.9"/>
  <rect x="167" y="73" width="14" height="14" rx="4" fill="url(#pa1)" transform="rotate(45, 174, 80)" opacity="0.9"/>
  <rect x="101" y="157" width="14" height="14" rx="4" fill="url(#pa1)" transform="rotate(45, 108, 164)" opacity="0.8"/>
  <rect x="167" y="157" width="14" height="14" rx="4" fill="url(#pa1)" transform="rotate(-45, 174, 164)" opacity="0.8"/>

  <!-- 3D Gear inner circle -->
  <circle cx="140" cy="122" r="30" fill="url(#pa1)" opacity="0.15" filter="url(#paSh)"/>
  <circle cx="140" cy="120" r="30" fill="url(#pa1)" opacity="0.2"/>
  <!-- Glass highlight -->
  <ellipse cx="133" cy="112" rx="18" ry="10" fill="url(#pa2)" opacity="0.6"/>

  <!-- Play/Automation arrow inside gear -->
  <polygon points="130,108 130,136 156,122" fill="url(#pa1)" opacity="0.8"/>
  <polygon points="130,108 130,118 143,113" fill="white" opacity="0.25"/>

  <!-- 3D Flow line down -->
  <path d="M140 185 L140 215" stroke="url(#pa1)" stroke-width="3" stroke-linecap="round"/>

  <!-- 3D Branching arrows -->
  <path d="M140 215 L140 230 L85 230" stroke="url(#pa1)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M140 230 L195 230" stroke="url(#pa1)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Arrow heads -->
  <polygon points="80,225 70,230 80,235" fill="url(#pa1)"/>
  <polygon points="200,225 210,230 200,235" fill="url(#pa1)"/>

  <!-- 3D Output nodes with glow -->
  <circle cx="60" cy="230" r="14" fill="url(#pa1)" opacity="0.12" filter="url(#paSh)"/>
  <circle cx="60" cy="228" r="12" stroke="url(#pa1)" stroke-width="2" fill="url(#pa1)" fill-opacity="0.15"/>
  <circle cx="57" cy="225" r="5" fill="white" opacity="0.2"/>
  <path d="M53 228 L57 232 L67 224" stroke="url(#pa1)" stroke-width="2" fill="none" stroke-linecap="round"/>

  <circle cx="220" cy="230" r="14" fill="url(#pa1)" opacity="0.12" filter="url(#paSh)"/>
  <circle cx="220" cy="228" r="12" stroke="url(#pa1)" stroke-width="2" fill="url(#pa1)" fill-opacity="0.15"/>
  <circle cx="217" cy="225" r="5" fill="white" opacity="0.2"/>
  <path d="M213 228 L217 232 L227 224" stroke="url(#pa1)" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
