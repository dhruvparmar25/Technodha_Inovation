<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <defs>
    <linearGradient id="ms1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB6557"/>
      <stop offset="100%" stop-color="#FE9139"/>
    </linearGradient>
    <linearGradient id="ms2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="msRad" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FE9139" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FB6557" stop-opacity="0.02"/>
    </radialGradient>
    <linearGradient id="msBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="msSh" x="-20%" y="-15%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#FB6557" flood-opacity="0.3"/>
    </filter>
    <filter id="msGl">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="500" height="400" rx="24" fill="url(#msBg2)"/>

  <!-- Grid -->
  <g opacity="0.06">
    <line x1="50" y1="0" x2="50" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="250" y1="0" x2="250" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="350" y1="0" x2="350" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="500" y2="80" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="500" y2="200" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="500" y2="320" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- 3D Shield glow -->
  <circle cx="250" cy="190" r="120" fill="url(#ms1)" opacity="0.03" filter="url(#msGl)"/>

  <!-- 3D Shield -->
  <path d="M250 55 L355 105 L355 215 Q355 305 250 345 Q145 305 145 215 L145 105 Z" stroke="url(#ms1)" stroke-width="3" fill="url(#msRad)" filter="url(#msSh)"/>
  <path d="M250 65 L340 110 L340 160 Q300 90 220 80 Z" fill="url(#ms2)" opacity="0.25"/>

  <!-- Inner shield -->
  <path d="M250 85 L335 125 L335 210 Q335 285 250 320 Q165 285 165 210 L165 125 Z" stroke="url(#ms1)" stroke-width="1.5" fill="none" opacity="0.15"/>

  <!-- 3D Wrench -->
  <g transform="translate(200, 145) rotate(-35, 50, 35)">
    <rect x="12" y="26" width="58" height="15" rx="5" fill="url(#ms1)" opacity="0.6" filter="url(#msSh)"/>
    <rect x="12" y="26" width="58" height="6" rx="3" fill="url(#ms2)" opacity="0.35"/>
    <circle cx="8" cy="34" r="18" stroke="url(#ms1)" stroke-width="3" fill="none" opacity="0.5"/>
    <circle cx="8" cy="34" r="8" fill="url(#ms1)" opacity="0.3"/>
  </g>

  <!-- 3D Gear -->
  <g transform="translate(240, 178)">
    <circle cx="28" cy="28" r="24" stroke="url(#ms1)" stroke-width="2.5" fill="url(#ms1)" fill-opacity="0.1" filter="url(#msSh)"/>
    <circle cx="28" cy="26" r="11" fill="url(#ms1)" opacity="0.35"/>
    <circle cx="25" cy="23" r="5" fill="white" opacity="0.15"/>
    <rect x="22" y="0" width="12" height="8" rx="3" fill="url(#ms1)" opacity="0.45"/>
    <rect x="22" y="48" width="12" height="8" rx="3" fill="url(#ms1)" opacity="0.4"/>
    <rect x="0" y="22" width="8" height="12" rx="3" fill="url(#ms1)" opacity="0.4"/>
    <rect x="48" y="22" width="8" height="12" rx="3" fill="url(#ms1)" opacity="0.4"/>
  </g>

  <!-- 3D Checkmark -->
  <path d="M230 268 L248 286 L282 250" stroke="url(#ms1)" stroke-width="4.5" fill="none" stroke-linecap="round" filter="url(#msSh)"/>

  <!-- Floating particles -->
  <circle cx="95" cy="100" r="4" fill="#FB6557" opacity="0.18"/>
  <circle cx="405" cy="120" r="5" fill="#FE9139" opacity="0.15"/>
  <circle cx="80" cy="310" r="3" fill="#FE9139" opacity="0.1"/>
  <circle cx="420" cy="300" r="4" fill="#FB6557" opacity="0.12"/>

  <!-- Pulse line accent -->
  <path d="M80 360 L125 360 L138 340 L155 380 L168 348 L178 360 L220 360" stroke="url(#ms1)" stroke-width="1.5" opacity="0.15" fill="none"/>
</svg>
