<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="ag1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB6557"/>
      <stop offset="100%" stop-color="#FE9139"/>
    </linearGradient>
    <linearGradient id="ag2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="agRad" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FE9139" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FB6557" stop-opacity="0.02"/>
    </radialGradient>
    <filter id="agSh">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#FB6557" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="200" height="200" rx="16" fill="#FFF7F2"/>

  <!-- 3D AI Chip -->
  <rect x="52" y="52" width="96" height="96" rx="16" stroke="url(#ag1)" stroke-width="2.5" fill="url(#agRad)" filter="url(#agSh)"/>
  <rect x="56" y="55" width="70" height="22" rx="10" fill="url(#ag2)" opacity="0.3"/>

  <!-- Inner chip -->
  <rect x="68" y="68" width="64" height="64" rx="10" stroke="url(#ag1)" stroke-width="1.5" fill="url(#ag1)" fill-opacity="0.06"/>

  <!-- AI text -->
  <text x="82" y="110" font-family="Arial" font-weight="bold" font-size="24" fill="url(#ag1)">AI</text>

  <!-- 3D Pins with depth -->
  <line x1="78" y1="52" x2="78" y2="36" stroke="url(#ag1)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="78" cy="33" r="3" fill="url(#ag1)" filter="url(#agSh)"/>
  <line x1="100" y1="52" x2="100" y2="36" stroke="url(#ag1)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="100" cy="33" r="3" fill="url(#ag1)" filter="url(#agSh)"/>
  <line x1="122" y1="52" x2="122" y2="36" stroke="url(#ag1)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="122" cy="33" r="3" fill="url(#ag1)" filter="url(#agSh)"/>

  <line x1="78" y1="148" x2="78" y2="164" stroke="url(#ag1)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="78" cy="167" r="3" fill="url(#ag1)" filter="url(#agSh)"/>
  <line x1="100" y1="148" x2="100" y2="164" stroke="url(#ag1)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="100" cy="167" r="3" fill="url(#ag1)" filter="url(#agSh)"/>
  <line x1="122" y1="148" x2="122" y2="164" stroke="url(#ag1)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="122" cy="167" r="3" fill="url(#ag1)" filter="url(#agSh)"/>

  <line x1="52" y1="78" x2="36" y2="78" stroke="url(#ag1)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="33" cy="78" r="3" fill="url(#ag1)" filter="url(#agSh)"/>
  <line x1="52" y1="100" x2="36" y2="100" stroke="url(#ag1)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="33" cy="100" r="3" fill="url(#ag1)" filter="url(#agSh)"/>
  <line x1="52" y1="122" x2="36" y2="122" stroke="url(#ag1)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="33" cy="122" r="3" fill="url(#ag1)" filter="url(#agSh)"/>

  <line x1="148" y1="78" x2="164" y2="78" stroke="url(#ag1)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="167" cy="78" r="3" fill="url(#ag1)" filter="url(#agSh)"/>
  <line x1="148" y1="100" x2="164" y2="100" stroke="url(#ag1)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="167" cy="100" r="3" fill="url(#ag1)" filter="url(#agSh)"/>
  <line x1="148" y1="122" x2="164" y2="122" stroke="url(#ag1)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="167" cy="122" r="3" fill="url(#ag1)" filter="url(#agSh)"/>
</svg>
