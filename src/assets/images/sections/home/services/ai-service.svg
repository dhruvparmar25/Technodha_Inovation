<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <defs>
    <linearGradient id="hs1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB6557"/>
      <stop offset="100%" stop-color="#FE9139"/>
    </linearGradient>
    <linearGradient id="hs2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="hsRad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FE9139" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FB6557" stop-opacity="0.03"/>
    </radialGradient>
    <linearGradient id="hsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="hsSh" x="-20%" y="-15%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#FB6557" flood-opacity="0.3"/>
    </filter>
    <filter id="hsGl">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="500" height="400" rx="24" fill="url(#hsBg)"/>

  <!-- Subtle grid -->
  <g opacity="0.06">
    <line x1="50" y1="0" x2="50" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="250" y1="0" x2="250" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="350" y1="0" x2="350" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="500" y2="80" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="500" y2="200" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="500" y2="320" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- 3D Brain glow backdrop -->
  <circle cx="250" cy="170" r="100" fill="url(#hs1)" opacity="0.04" filter="url(#hsGl)"/>

  <!-- 3D Brain -->
  <ellipse cx="250" cy="170" r="88" ry="78" stroke="url(#hs1)" stroke-width="2.5" fill="url(#hsRad)" filter="url(#hsSh)"/>
  <ellipse cx="235" cy="135" rx="50" ry="28" fill="url(#hs2)" opacity="0.3"/>

  <!-- Brain folds -->
  <path d="M250 92 Q250 170 250 248" stroke="url(#hs1)" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M250 112 Q215 125 195 155" stroke="url(#hs1)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M250 152 Q210 165 190 195" stroke="url(#hs1)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M250 112 Q285 125 305 155" stroke="url(#hs1)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M250 152 Q290 165 310 195" stroke="url(#hs1)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- 3D Neural nodes -->
  <circle cx="195" cy="155" r="9" fill="url(#hs1)" filter="url(#hsSh)"/>
  <circle cx="193" cy="152" r="4" fill="white" opacity="0.35"/>
  <circle cx="305" cy="155" r="9" fill="url(#hs1)" filter="url(#hsSh)"/>
  <circle cx="303" cy="152" r="4" fill="white" opacity="0.35"/>
  <circle cx="190" cy="195" r="8" fill="url(#hs1)" filter="url(#hsSh)" opacity="0.8"/>
  <circle cx="310" cy="195" r="8" fill="url(#hs1)" filter="url(#hsSh)" opacity="0.8"/>

  <!-- Cross connections -->
  <line x1="195" y1="155" x2="310" y2="195" stroke="url(#hs1)" stroke-width="1" opacity="0.15"/>
  <line x1="305" y1="155" x2="190" y2="195" stroke="url(#hs1)" stroke-width="1" opacity="0.15"/>

  <!-- 3D Circuit stems -->
  <path d="M250 252 L250 295" stroke="url(#hs1)" stroke-width="2.5"/>
  <path d="M250 295 L185 295 L185 328" stroke="url(#hs1)" stroke-width="2"/>
  <path d="M250 295 L315 295 L315 328" stroke="url(#hs1)" stroke-width="2"/>
  <path d="M250 295 L250 340" stroke="url(#hs1)" stroke-width="2"/>

  <!-- 3D Endpoints -->
  <circle cx="185" cy="333" r="8" fill="url(#hs1)" filter="url(#hsSh)"/>
  <circle cx="183" cy="330" r="3" fill="white" opacity="0.3"/>
  <circle cx="250" cy="345" r="8" fill="url(#hs1)" filter="url(#hsSh)"/>
  <circle cx="248" cy="342" r="3" fill="white" opacity="0.3"/>
  <circle cx="315" cy="333" r="8" fill="url(#hs1)" filter="url(#hsSh)"/>
  <circle cx="313" cy="330" r="3" fill="white" opacity="0.3"/>

  <!-- Floating particles -->
  <circle cx="95" cy="100" r="4" fill="#FB6557" opacity="0.2"/>
  <circle cx="405" cy="120" r="5" fill="#FE9139" opacity="0.18"/>
  <circle cx="80" cy="300" r="3" fill="#FE9139" opacity="0.12"/>
  <circle cx="420" cy="280" r="4" fill="#FB6557" opacity="0.15"/>

  <!-- Gear accent -->
  <circle cx="410" cy="85" r="20" stroke="#FE9139" stroke-width="1.5" fill="none" opacity="0.1"/>
  <circle cx="90" cy="310" r="16" stroke="#FB6557" stroke-width="1.5" fill="none" opacity="0.1"/>
</svg>
